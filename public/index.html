<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostHog Engineering Impact — Last 90 Days</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f54e00'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://github.com" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app">
    <header class="masthead">
      <div class="masthead-top">
        <h1>PostHog Engineering Impact</h1>
        <span class="window" id="window-label">—</span>
      </div>
      <p class="thesis">
        <strong>Impact = the substance &amp; reach of work shipped — not its volume.</strong>
        An LLM reads what each engineer actually shipped (the diff); reach is measured from the
        codebase itself. <button id="how-btn" class="link-btn" aria-expanded="false">How this is computed ▸</button>
      </p>
      <div class="statline" id="statline"></div>
      <div class="ai-banner" id="ai-banner"></div>
      <section id="methodology" class="methodology" hidden></section>
    </header>

    <ol class="leaderboard" id="leaderboard" aria-label="Top 5 most impactful engineers"></ol>

    <footer class="footer" id="footer"></footer>
  </main>
  <script src="./app.js"></script>
</body>
</html>
